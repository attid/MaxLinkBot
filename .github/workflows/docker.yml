name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: maxlinkbot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker run --rm maxlinkbot:test python -c "import sys; print(sys.version)"
